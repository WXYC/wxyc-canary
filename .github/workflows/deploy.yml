name: Deploy WXYC Canary

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run format:check
      - run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
      - uses: aws-actions/setup-sam@v3
        with:
          use-installer: true
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - run: npm ci
      - run: npm run build
      - name: SAM build
        run: sam build
      - name: SAM deploy
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --stack-name wxyc-canary \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --parameter-overrides \
              BackendUrl=${{ vars.BACKEND_URL || 'https://api.wxyc.org' }} \
              AuthUrl=${{ vars.AUTH_URL || 'https://api.wxyc.org/auth' }} \
              SemanticIndexUrl=${{ vars.SEMANTIC_INDEX_URL || 'https://explore.wxyc.org' }} \
              DjCredentialsSecretArn=${{ secrets.DJ_CREDENTIALS_SECRET_ARN }} \
              AlertEmail=${{ vars.ALERT_EMAIL }}

name: Deploy WXYC Canary

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run format:check
      - run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
      - uses: aws-actions/setup-sam@v3
        with:
          use-installer: true
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - run: npm ci
      - run: npm run build
      - name: SAM build
        run: sam build
      - name: SAM deploy
        # Optional params (runner-liveness probe + InfraAlertEmail) are
        # conditionally appended only when the operator has set the
        # corresponding GH Action variable. `sam deploy --parameter-overrides`
        # (shorthand `Key=Value` form) rejects empty values like
        # `GhaRunnerTokenSsmParamName=` with a parse error (fixed for the probe
        # params in 581f74b), so building the args via shell is the cleanest way
        # to omit a param entirely when its var is unset. The probe then stays
        # disabled (and InfraAlertEmail stays console-only) via the template's
        # own CFN-default behavior. See README "Runner liveness probe" and
        # "CI deploys" for the operator setup.
        env:
          GHA_RUNNER_TOKEN_SSM_PARAM_NAME: ${{ vars.GHA_RUNNER_TOKEN_SSM_PARAM_NAME }}
          GHA_RUNNER_ORG: ${{ vars.GHA_RUNNER_ORG || 'WXYC' }}
          GHA_RUNNER_ID: ${{ vars.GHA_RUNNER_ID || '0' }}
          INFRA_ALERT_EMAIL: ${{ vars.INFRA_ALERT_EMAIL }}
        run: |
          OPTIONAL_ARGS=()
          if [ -n "$GHA_RUNNER_TOKEN_SSM_PARAM_NAME" ]; then
            OPTIONAL_ARGS+=("GhaRunnerTokenSsmParamName=$GHA_RUNNER_TOKEN_SSM_PARAM_NAME")
            OPTIONAL_ARGS+=("GhaRunnerOrg=$GHA_RUNNER_ORG")
            OPTIONAL_ARGS+=("GhaRunnerId=$GHA_RUNNER_ID")
          fi
          # InfraAlertEmail is optional (empty -> console-only infra tier); omit
          # it entirely when unset, for the same empty-value parse reason above.
          if [ -n "$INFRA_ALERT_EMAIL" ]; then
            OPTIONAL_ARGS+=("InfraAlertEmail=$INFRA_ALERT_EMAIL")
          fi
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --stack-name wxyc-canary \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --parameter-overrides \
              BackendUrl=${{ vars.BACKEND_URL || 'https://api.wxyc.org' }} \
              AuthUrl=${{ vars.AUTH_URL || 'https://api.wxyc.org/auth' }} \
              SemanticIndexUrl=${{ vars.SEMANTIC_INDEX_URL || 'https://explore.wxyc.org' }} \
              LmlUrl=${{ vars.LML_URL || 'https://library-metadata-lookup-production.up.railway.app' }} \
              LmlApiKeySecretArn=${{ secrets.LML_API_KEY_SECRET_ARN }} \
              DjCredentialsSecretArn=${{ secrets.DJ_CREDENTIALS_SECRET_ARN }} \
              AlertEmail=${{ vars.ALERT_EMAIL }} \
              "${OPTIONAL_ARGS[@]}"

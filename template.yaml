AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  WXYC synthetic-DJ canary. Lambda function on a 5-minute schedule that
  exercises the WXYC user-facing API surface and emits CloudWatch metrics
  + alarms when anything fails.

Parameters:
  BackendUrl:
    Type: String
    Default: https://api.wxyc.org
    Description: Backend-Service base URL.
  AuthUrl:
    Type: String
    Default: https://api.wxyc.org/auth
    Description: better-auth base URL.
  SemanticIndexUrl:
    Type: String
    Default: https://explore.wxyc.org
    Description: semantic-index base URL.
  LmlUrl:
    Type: String
    Default: https://library-metadata-lookup-production.up.railway.app
    Description: >
      library-metadata-lookup base URL. The `lml-auth` check POSTs
      directly to `${LmlUrl}/api/v1/lookup` with `LML_API_KEY` to detect
      bearer rotation drift in isolation from the BS proxy path.
  LmlApiKeySecretArn:
    Type: String
    Default: ''
    Description: >
      Optional ARN of a Secrets Manager secret whose `SecretString` is
      the production LML bearer (plain string, not JSON — matches
      Railway's one-secret-one-value convention so the bearer rotates
      in one place across BS + rom + tubafrenzy + canary). When empty,
      the `lml-auth` check downgrades to skipped (operator gap, not
      regression — same shape as the DJ-credentials path).
  DjCredentialsSecretArn:
    Type: String
    Default: ''
    Description: >
      Optional ARN of a Secrets Manager secret holding the canary DJ login.
      JSON shape: {"email": "...", "password": "..."}. When empty, DJ-auth
      checks downgrade to skipped (not failed).
  AlertEmail:
    Type: String
    Default: ''
    Description: >
      Optional email address subscribed to the user-facing-outage page
      (`wxyc-canary-check-failure`, via `AlertTopic`). Leave empty to manage
      subscriptions outside this stack (e.g., wire to a Slack webhook via a
      separate subscription).
  InfraAlertEmail:
    Type: String
    Default: ''
    Description: >
      Optional email address subscribed to the low-urgency
      infra-degraded alarm (`wxyc-canary-infra-degraded`, via
      `InfraAlertTopic`) — the tier that catches a CI-runner offline or a
      nightly explore.wxyc.org blip without paging on-call (wxyc-canary#48
      DP2). Leave empty (the default) for console-only: the alarm still
      transitions in CloudWatch but nothing is notified. Set it to a
      filtered alias to get low-urgency email without a code change. An
      empty value is an accepted gap, not a silent one — record it.
  ScheduleExpression:
    Type: String
    Default: rate(5 minutes)
    Description: EventBridge schedule for the canary. rate() or cron().
  EnableWriteProbe:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >
      Opt in to the enrichment-quality write canary. When 'true', every
      invocation inserts a sentinel flowsheet row, polls for enrichment,
      and deletes the row. Defaults 'false' so a fresh deploy does not
      write to production until the DJ test account is provisioned and
      the operator has reviewed the cleanup-on-failure behaviour.
  EnrichmentLagThresholdSeconds:
    Type: Number
    Default: 30
    Description: >
      EnrichmentLag alarm threshold, in seconds. Fires when the canary's
      sentinel row took longer than this to be populated with a
      `youtube_music_url`. 30 s is the BS-side fire-and-forget timeout
      after which a real iOS playcut would already have rendered with
      null metadata.
  GitHubTokenSsmParamName:
    Type: String
    Default: ''
    AllowedPattern: '^(|/.+)$'
    Description: >
      Optional SSM Parameter Store name (SecureString) holding a fine-scoped
      GitHub PAT with `issues:write` on the issue target repo. Must begin
      with `/` (e.g. `/wxyc-canary/github-token`) so the IAM policy ARN
      composes correctly. When set together with GitHubIssuesRepo, each
      Lambda invocation mirrors check outcomes into GitHub issues: opens
      an issue on first fail, comments on repeat fails (deduped by
      `canary:check:{name}` label), and closes with a recovery comment
      when the check passes. Leave empty to keep SNS-only alerting.
  GitHubIssuesRepo:
    Type: String
    Default: ''
    Description: >
      Optional `owner/repo` target for canary-filed issues, e.g.
      `WXYC/wxyc-canary`. Paired with GitHubTokenSsmParamName.
  GhaRunnerTokenSsmParamName:
    Type: String
    Default: ''
    AllowedPattern: '^(|/.+)$'
    Description: >
      Optional SSM Parameter Store name (SecureString) holding a
      fine-scoped GitHub PAT with `admin:org → Self-hosted runners:
      Read` (classic) or the fine-grained equivalent on the WXYC org.
      Must begin with `/` (e.g. `/wxyc-canary/gha-runner-token`) so
      the IAM policy ARN composes correctly. When set together with
      `GhaRunnerId`, the `gha-runner-online` check polls
      `GET /orgs/{org}/actions/runners/{id}` every 5 minutes and the
      `wxyc-canary-check-failure` alarm fires after ~10 minutes of
      sustained `status != "online"`. Leave empty to skip the probe
      (operator gap, no alarm).
  GhaRunnerOrg:
    Type: String
    Default: WXYC
    Description: GitHub organization that owns the self-hosted runner.
  GhaRunnerId:
    Type: Number
    Default: 0
    Description: >
      Numeric runner id assigned by GitHub at registration. Discover via
      `gh api /orgs/WXYC/actions/runners --jq '.runners[] | select(.name=="wxyc-e2e-runner") | .id'`.
      The id changes when the runner is replaced (re-registration), so
      this parameter must be re-set after an instance swap — see
      wxyc-shared `scripts/e2e-runner/README.md`. Leave at 0 to skip the
      probe (the check downgrades to skipped, no alarm). Disabling
      mechanism: the `HasGhaRunnerProbe` condition sets the env var to
      empty string when this parameter is 0, which the handler env loader
      reads as undefined; the check's own runner-id guard
      (`Number.isInteger(id) && id > 0`) is the second line of defense
      for any non-CFN deploy path (local invoke, manual env override).

Conditions:
  HasDjCredentials: !Not [!Equals [!Ref DjCredentialsSecretArn, '']]
  HasLmlApiKey: !Not [!Equals [!Ref LmlApiKeySecretArn, '']]
  HasAlertEmail: !Not [!Equals [!Ref AlertEmail, '']]
  HasInfraAlertEmail: !Not [!Equals [!Ref InfraAlertEmail, '']]
  HasGitHubReporter: !And
    - !Not [!Equals [!Ref GitHubTokenSsmParamName, '']]
    - !Not [!Equals [!Ref GitHubIssuesRepo, '']]
  HasGhaRunnerProbe: !And
    - !Not [!Equals [!Ref GhaRunnerTokenSsmParamName, '']]
    # !Ref on a Number parameter returns the value as a string ("0"), so the
    # right-hand operand of !Equals must be the literal string "0", not 0.
    - !Not [!Equals [!Ref GhaRunnerId, '0']]

Resources:
  CanaryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: wxyc-canary
      Description: Synthetic-DJ canary; runs every 5 minutes against prod.
      CodeUri: dist/
      Handler: handler.handler
      Runtime: nodejs24.x
      Architectures:
        - arm64
      MemorySize: 256
      Timeout: 60
      Environment:
        Variables:
          CANARY_BACKEND_URL: !Ref BackendUrl
          CANARY_AUTH_URL: !Ref AuthUrl
          CANARY_SEMANTIC_INDEX_URL: !Ref SemanticIndexUrl
          CANARY_LML_URL: !Ref LmlUrl
          CANARY_LML_API_KEY_SECRET_ARN: !If [HasLmlApiKey, !Ref LmlApiKeySecretArn, '']
          CANARY_DJ_SECRET_ARN: !If [HasDjCredentials, !Ref DjCredentialsSecretArn, '']
          CANARY_ENABLE_WRITE_PROBE: !Ref EnableWriteProbe
          CANARY_GITHUB_TOKEN_SSM_PARAM: !If [HasGitHubReporter, !Ref GitHubTokenSsmParamName, '']
          CANARY_GITHUB_ISSUES_REPO: !If [HasGitHubReporter, !Ref GitHubIssuesRepo, '']
          CANARY_GHA_RUNNER_TOKEN_SSM_PARAM: !If [HasGhaRunnerProbe, !Ref GhaRunnerTokenSsmParamName, '']
          CANARY_GHA_RUNNER_ORG: !Ref GhaRunnerOrg
          # Empty-string when the probe is disabled so the handler env loader
          # sees a falsy value and the check downgrades to skipped (no alarm).
          # When the probe is enabled, CFN stringifies the Number to e.g. "250".
          CANARY_GHA_RUNNER_ID: !If [HasGhaRunnerProbe, !Ref GhaRunnerId, '']
      Policies:
        - Statement:
            - Effect: Allow
              Action: cloudwatch:PutMetricData
              Resource: '*'
              Condition:
                StringEquals:
                  cloudwatch:namespace: WXYC/Canary
        - !If
          - HasDjCredentials
          - Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref DjCredentialsSecretArn
          - !Ref AWS::NoValue
        - !If
          - HasLmlApiKey
          - Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref LmlApiKeySecretArn
          - !Ref AWS::NoValue
        - !If
          - HasGitHubReporter
          - Statement:
              - Effect: Allow
                Action: ssm:GetParameter
                Resource: !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${GitHubTokenSsmParamName}
          - !Ref AWS::NoValue
        - !If
          - HasGhaRunnerProbe
          - Statement:
              - Effect: Allow
                Action: ssm:GetParameter
                Resource: !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${GhaRunnerTokenSsmParamName}
          - !Ref AWS::NoValue
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: !Ref ScheduleExpression
            Description: Run the WXYC canary on a fixed cadence.

  CanaryLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${CanaryFunction}
      RetentionInDays: 30

  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: wxyc-canary-alerts
      DisplayName: WXYC Canary Alerts

  AlertEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasAlertEmail
    Properties:
      TopicArn: !Ref AlertTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  # Separate low-urgency channel for the infra/CI tier (wxyc-canary#48 DP2).
  # Kept distinct from AlertTopic so the page (`wxyc-canary-check-failure`)
  # stays clean while the infra signal — runner offline, nightly
  # explore.wxyc.org blip — remains a config toggle (subscribe `InfraAlertEmail`)
  # rather than a redeploy. SNS topics are free; an unsubscribed topic is
  # console-only (the alarm transitions in CloudWatch, nothing is notified).
  InfraAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: wxyc-canary-infra-alerts
      DisplayName: WXYC Canary Infra Alerts (low-urgency)

  InfraAlertEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasInfraAlertEmail
    Properties:
      TopicArn: !Ref InfraAlertTopic
      Protocol: email
      Endpoint: !Ref InfraAlertEmail

  # User-facing-outage page. Fires when any USER-FACING check has reported a
  # failure 2 of the last 3 evaluations (~10 minutes at the 5-minute schedule),
  # which avoids alerting on a single transient blip while still catching
  # sustained outages quickly. Targets the dimensionless `UserFacingCheckFailure`
  # aggregate (wxyc-canary#48) — every check except the two infra/CI probes
  # (`gha-runner-online`, `semantic-index-search`, tagged `pagesOncall: false`)
  # contributes to it. Those two route to `InfraCheckFailure` /
  # `wxyc-canary-infra-degraded` below so a runner-offline or nightly
  # explore.wxyc.org blip no longer pages on-call and trains it to ignore the
  # page. See CLAUDE.md "Conventions" for the tier split and for why this isn't
  # a SUM(SEARCH(...)) alarm. AlarmName kept as `wxyc-canary-check-failure` so
  # pinned dashboards / runbook references survive the metric repoint.
  CheckFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: wxyc-canary-check-failure
      AlarmDescription: One or more user-facing WXYC canary checks have been failing.
      Namespace: WXYC/Canary
      MetricName: UserFacingCheckFailure
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 3
      DatapointsToAlarm: 2
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic

  # Low-urgency infra/CI tier alarm (wxyc-canary#48 DP2). Same 2-of-3 ×
  # 5-min Maximum shape as the page, but targets the dimensionless
  # `InfraCheckFailure` aggregate — the series the two `pagesOncall: false`
  # probes (`gha-runner-online`, `semantic-index-search`) contribute to.
  # Wired to `InfraAlertTopic` (NOT `AlertTopic`) so it never trips the
  # user-facing page; with `InfraAlertEmail` empty the topic is unsubscribed
  # and the alarm is console-only. The contract test in test/handler.test.ts
  # pins that this alarm targets a metric shape the handler actually emits.
  InfraDegradedAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: wxyc-canary-infra-degraded
      AlarmDescription: A WXYC canary infra/CI probe (runner liveness / semantic-index) has been failing.
      Namespace: WXYC/Canary
      MetricName: InfraCheckFailure
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 3
      DatapointsToAlarm: 2
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref InfraAlertTopic
      OKActions:
        - !Ref InfraAlertTopic

  # Enrichment-quality SLO alarm. Targets the dimensionless EnrichmentLag
  # series emitted by the `enrichment-quality` write canary. Threshold and
  # treatment-of-missing-data:
  #   - Threshold is operator-tunable via `EnrichmentLagThresholdSeconds`
  #     (default 30 s — the BS-side fire-and-forget timeout after which an
  #     iOS playcut would have rendered with null metadata).
  #   - 3 evaluation periods at 5 min cadence = the alarm needs sustained
  #     breach (15 min) before firing, which clears small Discogs-side
  #     latency spikes without delaying the on-air paging window.
  #   - `notBreaching` on missing data: when `EnableWriteProbe=false` the
  #     metric is simply absent, and the alarm must sit at OK — wxyc-canary#13
  #     pinned the "no data → no firing" failure mode the other way.
  EnrichmentLagAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: wxyc-canary-enrichment-lag
      AlarmDescription: WXYC canary sentinel row exceeded the enrichment lag SLO.
      Namespace: WXYC/Canary
      # The metric is suffixed with the unit because CloudWatch's dashboard
      # views surface name and unit together — `EnrichmentLagSeconds` is
      # immediately self-documenting in the metric picker. The `Seconds`
      # suffix is also the unit hint `publishMetrics` reads when emitting
      # this datum. Suffix convention: `*Seconds`, `*Milliseconds`, or
      # default `Count` (see `unitForMetric` in src/handler.ts).
      MetricName: EnrichmentLagSeconds
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 3
      DatapointsToAlarm: 3
      Threshold: !Ref EnrichmentLagThresholdSeconds
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic

  # Catches the case where the Lambda itself fails to run (timeout, crash
  # before reaching the metric publish, etc). Without this, a Lambda that
  # never publishes metrics would let the CheckFailure alarm sit at OK.
  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: wxyc-canary-lambda-errors
      AlarmDescription: WXYC canary Lambda has been throwing or timing out.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref CanaryFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      DatapointsToAlarm: 2
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic

  # Backend-Service mutation 4xx surge alarm. Targets the dimensionless
  # MutationClientError series Backend-Service publishes from the
  # responseMetrics middleware (BS#704 added the dimensioned series,
  # BS#845 / BS PR #1309 added the dimensionless companion required for
  # plain-form alarming — see wxyc-canary#13 for the same trap on the
  # canary side). Threshold 20 per 5-minute window over 2 of 2 windows
  # means sustained >4/min for 10 minutes before paging, which absorbs
  # deploy windows and one-off transient 4xx without alerting. Investigate
  # via Sentry trace explorer — Sentry issues no longer carry 4xx after
  # BS#691.
  MutationClientErrorSurgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: wxyc-canary-mutation-4xx-surge
      AlarmDescription: >
        Sustained surge of 4xx responses on Backend-Service mutation routes
        (POST/PATCH/DELETE /flowsheet/*). Investigate via Sentry trace
        explorer — Sentry issues no longer carry 4xx after BS#691.
      Namespace: WXYC/BackendService
      MetricName: MutationClientError
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      DatapointsToAlarm: 2
      Threshold: 20
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic

Outputs:
  FunctionArn:
    Value: !GetAtt CanaryFunction.Arn
  AlertTopicArn:
    Value: !Ref AlertTopic
    Description: User-facing-outage page topic. Subscribe additional endpoints (Slack webhook, PagerDuty, etc.) here.
  InfraAlertTopicArn:
    Value: !Ref InfraAlertTopic
    Description: Low-urgency infra/CI tier topic (wxyc-canary#48 DP2). Subscribe a filtered alias or Slack channel for non-paging signal.
